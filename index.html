<html lang="de"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Poker</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Custom styles (remain unchanged) */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .card {
            border: 1px solid #d1d5db; border-radius: 0.5rem; padding: 1rem 1.5rem;
            background-color: white; cursor: pointer; transition: all 0.2s ease-in-out;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            display: flex; justify-content: center; align-items: center;
            width: 50px; 
            height: 80px; font-size: 1.25rem; font-weight: 500;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .card.selected {
            background-color: #3b82f6; color: white; border-color: #2563eb;
        }
        .participant-container {
            display: flex; flex-direction: column; align-items: center;
            position: relative; min-width: 80px;
        }
        .participant-name {
            font-size: 0.75rem; font-weight: 500; color: #374151; margin-bottom: 0.25rem;
            text-align: center; width: 100%; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .participant-vote-card {
            border: 1px solid #e5e7eb; border-radius: 0.375rem; background-color: #e5e7eb;
            color: #4b5563; width: 50px; height: 80px; display: flex;
            justify-content: center; align-items: center; font-size: 1.25rem; font-weight: 600;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        .participant-vote-card.voted {
            background-color: #3b82f6;
            color: white;
            border-color: #2563eb;
        }
        .participant-vote-card.revealed {
            background-color: #3b82f6; color: white; border-color: #2563eb;
        }
        /* Remove tooltip styles */
        /*
        .tooltip {
            visibility: hidden; width: 100px; 
            background-color: #1f2937; color: #fff; text-align: center;
            border-radius: 6px; padding: 5px 0; position: absolute; z-index: 10;
            bottom: calc(80px + 0.25rem + 1.2em); left: 50%; transform: translateX(-50%);
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .tooltip::after {
            content: ""; position: absolute; top: 100%; left: 50%; margin-left: -5px;
            border-width: 5px; border-style: solid; border-color: #1f2937 transparent transparent transparent;
        }
        .participant-container:hover .tooltip {
            visibility: visible; opacity: 1; pointer-events: auto;
        }
        .kick-button {
            cursor: pointer; color: #ef4444; font-weight: bold;
        }
         .kick-button:hover { color: #dc2626; }
        */
        .results-summary {
            background-color: #e0f2fe; border: 1px solid #bae6fd; border-radius: 0.5rem;
            padding: 1rem;
            margin-top: 1.5rem; text-align: center;
        }
        .results-summary .average {
            font-size: 2.5rem; font-weight: 700; color: #0284c7;
        }
        .results-summary .vote-distribution div {
            border: 1px solid #d1d5db; border-radius: 0.375rem; padding: 0.5rem;
            background-color: white; margin: 0.25rem; min-width: 80px;
        }
        .results-summary .vote-distribution .vote-value {
            font-size: 1.25rem; font-weight: 600;
        }
        .results-summary .vote-distribution .vote-count {
            font-size: 0.875rem; color: #6b7280;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Alert Banner Styles */
        .alert-error {
            background-color: #fecaca; /* Light red */
            color: #b91c1c; /* Dark red */
        }
        .alert-success {
             background-color: #dcfce7; /* Light green */
             color: #166534; /* Dark green */
        }
        .alert-info {
             background-color: #dbeafe; /* Light blue */
             color: #1e40af; /* Dark blue */
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex justify-center items-start">

    <!-- In-Page Alert Container -->
    <div id="alert-banner" class="hidden fixed top-4 left-1/2 transform -translate-x-1/2 z-50 px-4 py-2 rounded-md shadow-md text-sm font-medium transition-all duration-300 ease-in-out max-w-md w-full text-center">
        <span id="alert-message"></span>
        <!-- Optional: Add a close button if needed -->
    </div>

    <div id="create-room-screen" class="hidden bg-white p-6 rounded-lg shadow-md w-full max-w-md text-center mt-4">
        <h1 class="text-2xl font-bold mb-4 text-gray-700">Planning Poker</h1>
        <p class="text-gray-600 mb-3">Neue Sitzung erstellen</p>
        <input type="text" id="room-name-input" placeholder="Raumname eingeben" class="w-full px-4 py-2 border rounded-md mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button id="create-room-button" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-md transition duration-200">
            Raum erstellen
        </button>

    </div>

    <div id="enter-name-screen" class="hidden bg-white p-6 rounded-lg shadow-md w-full max-w-md text-center mt-4">
        <h1 class="text-2xl font-bold mb-4 text-gray-700">Raum beitreten</h1>
        <p class="text-gray-600 mb-3">Gib deinen Anzeigenamen für diese Sitzung ein:</p>
        <input type="text" id="display-name-input" placeholder="Dein Name" class="w-full px-4 py-2 border rounded-md mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button id="join-room-button" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-md transition duration-200">
            Sitzung beitreten
        </button>
    </div>

    <div id="poker-room-screen" class="hidden w-full max-w-6xl mx-auto bg-white p-6 md:p-8 rounded-lg shadow-lg overflow-y-auto mt-4">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-2xl md:text-2xl font-bold text-gray-800" id="room-title">Planning Poker</h1>
            <div class="flex items-center space-x-2">
                 <span class="text-sm text-gray-500">Einladungslink:</span>
                 <button id="copy-link-button" title="Einladungslink kopieren" class="p-2 rounded-md hover:bg-gray-200 text-gray-600 hover:text-gray-800 transition duration-150">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                 </button>
                 <span id="copy-link-feedback" class="text-sm text-green-600 hidden">Kopiert!</span>
            </div>
        </div>

        <div class="mb-2">
            <h2 class="text-lg font-semibold mb-3 text-gray-700">Teilnehmer:</h2>
            <div id="participants-list" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 xl:grid-cols-12 gap-x-2 gap-y-6">
                </div>
        </div>

        <div id="results-summary-section" class="results-summary hidden mb-4">
          
            <div id="average-vote" class="average mb-4"></div>
            <div id="vote-distribution" class="flex flex-wrap justify-center items-center">
                </div>
        </div>

        <div class="flex flex-col sm:flex-row justify-center items-center space-y-4 sm:space-y-0 sm:space-x-4 mb-2">
             <button id="reveal-button" class="bg-blue-400 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded-md transition duration-200 w-full sm:w-auto disabled:opacity-50 disabled:cursor-not-allowed">
                Aufdecken
            </button>
            <button id="reset-button" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-6 rounded-md transition duration-200 w-full sm:w-auto">
                Zurücksetzen
            </button>
        </div>

        <div>
            <h2 class="text-lg font-semibold mb-3 text-gray-700">Deine Schätzung:</h2>
            <div id="voting-cards" class="flex flex-wrap justify-center gap-3 md:gap-4">
                </div>
        </div>

    </div>

     <div id="kicked-out-screen" class="hidden bg-white p-8 rounded-lg shadow-md w-full max-w-md text-center max-h-[30vh] mt-4">
        <h1 class="text-2xl font-bold mb-6 text-red-600">Du wurdest entfernt</h1>
        <p class="text-gray-600 mb-4">Du wurdest aus der Sitzung entfernt.</p>
        <button onclick="window.location.href = window.location.pathname;" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-md transition duration-200">
            Zur Startseite
        </button>
    </div>

    <script type="module">
        // Firebase Configuration (REPLACE with your actual config)
        const firebaseConfig = {
            apiKey: "AIzaSyABZ2rEEwDsGUNQ475Iq_RzfqYlMqUEW-M",
            authDomain: "planningpoker-115b0.firebaseapp.com",
            databaseURL: "https://planningpoker-115b0-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "planningpoker-115b0",
            storageBucket: "planningpoker-115b0.appspot.com", // Corrected storage bucket
            messagingSenderId: "883176222007",
            appId: "1:883176222007:web:b18ea07bdf0733bd557eb2"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // --- Global Variables ---
        let currentRoomId = null;
        let currentUserId = sessionStorage.getItem('planningPokerUserId');
        let currentUsername = null;
        let roomRef = null;
        let participantsRef = null;
        let kickedUsersRef = null;
        let userRef = null;
        let countdownInterval = null; // For reveal countdown
        const VOTE_VALUES = ['0', '0.5', '1', '2', '3', '5', '8', '?', '☕'];

        // --- DOM Elements ---
        const createRoomScreen = document.getElementById('create-room-screen');
        const enterNameScreen = document.getElementById('enter-name-screen');
        const pokerRoomScreen = document.getElementById('poker-room-screen');
        const kickedOutScreen = document.getElementById('kicked-out-screen');

        const roomNameInput = document.getElementById('room-name-input');
        const createRoomButton = document.getElementById('create-room-button');
        const displayNameInput = document.getElementById('display-name-input');
        const joinRoomButton = document.getElementById('join-room-button');

        const roomTitle = document.getElementById('room-title');
        const participantsList = document.getElementById('participants-list');
        const votingCardsContainer = document.getElementById('voting-cards');
        const revealButton = document.getElementById('reveal-button');
        const resetButton = document.getElementById('reset-button');
        const copyLinkButton = document.getElementById('copy-link-button');
        const copyLinkFeedback = document.getElementById('copy-link-feedback');
        const resultsSummarySection = document.getElementById('results-summary-section');
        const averageVoteDisplay = document.getElementById('average-vote');
        const voteDistributionDisplay = document.getElementById('vote-distribution');
        const alertBanner = document.getElementById('alert-banner');
        const alertMessage = document.getElementById('alert-message');

        // --- Functions ---

        // In-Page Alert Function
        let alertTimeout = null;
        function showInPageAlert(message, type = 'info', duration = 3000) {
            clearTimeout(alertTimeout); // Clear previous timeout if any
            alertMessage.textContent = message;
            alertBanner.className = alertBanner.className.replace(/alert-\w+/g, ''); // Remove previous type classes
            alertBanner.classList.add(`alert-${type}`); // Add new type class
            alertBanner.classList.remove('hidden');
            alertBanner.style.opacity = '1'; // Ensure visible

            if (duration) {
                 alertTimeout = setTimeout(() => {
                    alertBanner.style.opacity = '0';
                    // Wait for transition before hiding completely
                    setTimeout(() => alertBanner.classList.add('hidden'), 300);
                 }, duration);
            }
        }

        // Generate a simple unique ID
        function generateUserId() {
            return 'user_' + Math.random().toString(36).substring(2, 15);
        }

        // Show specific screen, hide others
        function showScreen(screenToShow) {
            createRoomScreen.classList.add('hidden');
            enterNameScreen.classList.add('hidden');
            pokerRoomScreen.classList.add('hidden');
            kickedOutScreen.classList.add('hidden');
            screenToShow.classList.remove('hidden');

            // Autofocus the relevant input field
            if (screenToShow === createRoomScreen) {
                roomNameInput.focus();
            } else if (screenToShow === enterNameScreen) {
                displayNameInput.focus();
            }
        }

        // Handle Room Creation
        async function handleCreateRoom() {
            const roomName = roomNameInput.value.trim();
            if (!roomName) {
                showInPageAlert('Bitte gib einen Raumnamen ein.', 'error'); // Use new alert
                return;
            }

            try {
                const newRoomRef = database.ref('rooms').push();
                currentRoomId = newRoomRef.key;
                await newRoomRef.set({
                    roomName: roomName,
                    revealed: false,
                    revealCountdownEnd: null,
                    participants: {},
                    kickedUsers: {}
                });
                // Update URL hash and show name entry screen
                window.location.hash = currentRoomId;
                showScreen(enterNameScreen);
            } catch (error) {
                console.error("Error creating room:", error);
                showInPageAlert('Raum konnte nicht erstellt werden. Bitte versuche es erneut.', 'error'); // Use new alert
            }
        }

        // Handle Joining Room (after name entry)
        async function handleJoinRoom() {
            const displayName = displayNameInput.value.trim();
            if (!displayName) {
                showInPageAlert('Bitte gib deinen Anzeigenamen ein.', 'error'); // Use new alert
                return;
            }
            if (!currentRoomId) {
                showInPageAlert('Ungültige Raum-ID.', 'error'); // Use new alert
                showScreen(createRoomScreen); // Go back to start
                window.location.hash = '';
                return;
            }

            currentUsername = displayName;

            // Generate or retrieve user ID
            if (!currentUserId) {
                currentUserId = generateUserId();
                sessionStorage.setItem('planningPokerUserId', currentUserId);
            }

            try {
                // Check if user was previously kicked
                const kickedSnapshot = await database.ref(`rooms/${currentRoomId}/kickedUsers/${currentUserId}`).once('value');
                if (kickedSnapshot.exists() && kickedSnapshot.val() === true) {
                    showScreen(kickedOutScreen);
                    return; // Stop joining process
                }

                roomRef = database.ref(`rooms/${currentRoomId}`);
                participantsRef = database.ref(`rooms/${currentRoomId}/participants`);
                kickedUsersRef = database.ref(`rooms/${currentRoomId}/kickedUsers`);
                userRef = database.ref(`rooms/${currentRoomId}/participants/${currentUserId}`);

                // Add user to participants
                await userRef.set({
                    name: currentUsername,
                    vote: null,
                    hasVoted: false
                });

                // Set up listener to remove user on disconnect
                await userRef.onDisconnect().remove();

                // Set up listener for room changes
                listenToRoomChanges();

                // Set up listener for kicked status
                listenForKickedStatus();

                // Store last room ID in session storage
                sessionStorage.setItem('planningPokerLastRoomId', currentRoomId);

                showScreen(pokerRoomScreen);
                renderVotingCards();
                // Initialize Lucide icons after showing the screen
                lucide.createIcons();

            } catch (error) {
                console.error("Error joining room:", error);
                showInPageAlert('Beitritt zum Raum fehlgeschlagen. Der Raum existiert möglicherweise nicht oder es gab ein Verbindungsproblem.', 'error'); // Use new alert
                window.location.hash = ''; // Clear invalid hash
                showScreen(createRoomScreen);
            }
        }

        // Listen for changes in the room data
        function listenToRoomChanges() {
            if (!roomRef) return;

            roomRef.on('value', (snapshot) => {
                if (!snapshot.exists()) {
                    // Room deleted or doesn't exist
                    showInPageAlert('Dieser Raum existiert nicht mehr.', 'error', 5000); // Longer duration
                    cleanupAndRedirect();
                    return;
                }

                const roomData = snapshot.val();

                // Check if current user is still in participants (might have been kicked)
                if (!roomData.participants || !roomData.participants[currentUserId]) {
                    const kicked = roomData.kickedUsers && roomData.kickedUsers[currentUserId];
                     if (!kicked) {
                        console.log("User not found in participants, redirecting.");
                        if (!kickedOutScreen.classList.contains('hidden')) return;
                        cleanupAndRedirect();
                     }
                    return; // Kicked status handled by listenForKickedStatus
                }

                roomTitle.textContent = roomData.roomName || 'Planning Poker';
                renderParticipants(roomData.participants || {}, roomData.revealed || false);
                updateVotingCardsSelection(roomData.participants[currentUserId]?.vote);
                updateActionButtons(roomData.participants || {}, roomData.revealed || false, roomData.revealCountdownEnd);
                renderResults(roomData.participants || {}, roomData.revealed || false);
                handleCountdown(roomData.revealCountdownEnd);
                lucide.createIcons();

            }, (error) => {
                console.error("Error listening to room changes:", error);
                showInPageAlert("Verbindungsfehler. Bitte aktualisiere die Seite.", 'error', 5000); // Longer duration
                cleanupAndRedirect();
            });
        }

         // Listen specifically for changes to the kicked status of the current user
        function listenForKickedStatus() {
            if (!kickedUsersRef || !currentUserId) return;

            const userKickedRef = database.ref(`rooms/${currentRoomId}/kickedUsers/${currentUserId}`);
            userKickedRef.on('value', (snapshot) => {
                if (snapshot.exists() && snapshot.val() === true) {
                    console.log("Kicked status detected.");
                    showScreen(kickedOutScreen);
                    cleanupRoomListeners();
                    sessionStorage.removeItem('planningPokerRoomId');
                    sessionStorage.removeItem('planningPokerLastRoomId');
                }
            }, (error) => {
                console.error("Error listening for kicked status:", error);
            });
        }


        // Render the list of participants with name above the card
        function renderParticipants(participants, revealed) {
            participantsList.innerHTML = ''; // Clear existing list
            Object.entries(participants).forEach(([id, participant]) => {
                const container = document.createElement('div');
                container.className = 'participant-container group relative';
                container.dataset.userId = id;

                const nameEl = document.createElement('div');
                nameEl.className = 'participant-name';
                nameEl.textContent = participant.name;
                nameEl.title = participant.name;

                const voteCard = document.createElement('div');
                voteCard.className = 'participant-vote-card';

                if (revealed) {
                    voteCard.textContent = participant.vote ?? '-';
                    voteCard.classList.add('revealed');
                } else {
                    if (participant.hasVoted) {
                        voteCard.innerHTML = '<i data-lucide="check" class="w-6 h-6"></i>'; // Use icon
                        voteCard.classList.add('voted'); // Add blue background class
                        // voteCard.textContent = '✓'; // Remove text checkmark
                    } else {
                        voteCard.textContent = '?'; // Show question mark
                        voteCard.classList.remove('voted'); // Ensure not blue if vote removed
                    }
                    // Ensure revealed styles are not applied before reveal
                    voteCard.classList.remove('revealed');
                }

                container.appendChild(nameEl);
                container.appendChild(voteCard);

                if (id !== currentUserId) {
                    const removeButton = document.createElement('button');
                    removeButton.className = `
                        absolute -top-1.5 -right-1.5 /* Adjusted position */ 
                        bg-white rounded-full p-0.5 /* Smaller padding */ 
                        shadow border border-gray-200 
                        text-red-500 hover:text-red-700 hover:bg-red-50
                        opacity-0 group-hover:opacity-100 
                        transition-opacity duration-200 ease-in-out
                        focus:outline-none focus:ring-1 focus:ring-red-300 /* Smaller ring */
                    `; // Tailwind classes for styling and positioning
                    removeButton.title = 'Benutzer entfernen'; // GERMAN
                    removeButton.innerHTML = '<i data-lucide="trash-2" class="w-3.5 h-3.5"></i>'; /* Smaller icon */
                    removeButton.onclick = (e) => {
                        e.stopPropagation(); // Prevent clicks on elements underneath
                        handleKickUser(id);
                    };
                    container.appendChild(removeButton);
                }

                participantsList.appendChild(container);
            });
             // Ensure icons render after updates
             lucide.createIcons();
        }

        // Render the voting cards
        function renderVotingCards() {
            votingCardsContainer.innerHTML = '';
            VOTE_VALUES.forEach(value => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.value = value;
                card.textContent = value === '☕' ? '☕' : value;
                card.onclick = () => handleVote(value);
                votingCardsContainer.appendChild(card);
            });
        }

        // Handle user voting
        async function handleVote(value) {
            if (!userRef) return;
            try {
                const currentVoteSnapshot = await userRef.child('vote').once('value');
                const currentVote = currentVoteSnapshot.val();
                if (currentVote === value) {
                    await userRef.update({ vote: null, hasVoted: false });
                } else {
                    await userRef.update({ vote: value, hasVoted: true });
                }
            } catch (error) {
                console.error("Error casting vote:", error);
                showInPageAlert('Stimme konnte nicht abgegeben werden.', 'error'); // Use new alert
            }
        }

        // Update visual selection of voting cards
        function updateVotingCardsSelection(selectedVote) {
            const cards = votingCardsContainer.querySelectorAll('.card');
            cards.forEach(card => {
                if (card.dataset.value === selectedVote) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('selected');
                }
            });
        }

        // Handle Reveal Votes button click
        async function handleRevealVotes() {
            if (!roomRef) return;
            revealButton.disabled = true;
            try {
                const countdownEndTime = Date.now() + 3000;
                await roomRef.update({ revealCountdownEnd: countdownEndTime });
            } catch (error) {
                console.error("Error initiating reveal:", error);
                showInPageAlert('Starten des Aufdeckens fehlgeschlagen.', 'error'); // Use new alert
                revealButton.disabled = false;
            }
        }

        // Handle countdown logic
        function handleCountdown(countdownEndTime) {
            clearInterval(countdownInterval);
            if (countdownEndTime && countdownEndTime > Date.now()) {
                revealButton.disabled = true;
                const updateTimer = () => {
                    const remaining = Math.max(0, countdownEndTime - Date.now());
                    const seconds = Math.ceil(remaining / 1000);
                    revealButton.textContent = `Wird aufgedeckt in ${seconds}...`; // GERMAN
                    if (remaining === 0) {
                        clearInterval(countdownInterval);
                         if(roomRef) {
                             roomRef.update({ revealed: true, revealCountdownEnd: null })
                                .catch(err => console.error("Error setting revealed=true:", err));
                         }
                    }
                };
                countdownInterval = setInterval(updateTimer, 500);
                updateTimer();
            } else {
                if (countdownEndTime && countdownEndTime <= Date.now()) {
                     if(roomRef) {
                         roomRef.child('revealed').once('value', snap => {
                            if (!snap.val()) {
                                roomRef.update({ revealed: true, revealCountdownEnd: null })
                                    .catch(err => console.error("Error setting revealed=true post-countdown:", err));
                            } else if (snap.val() && roomRef.child('revealCountdownEnd').exists()) {
                                roomRef.child('revealCountdownEnd').remove();
                            }
                         });
                     }
                }
                 roomRef.child('revealed').once('value', snapshot => {
                    const isRevealed = snapshot.val();
                    if (!isRevealed) {
                        revealButton.textContent = 'Aufdecken'; // GERMAN
                        revealButton.disabled = false;
                    } else {
                        revealButton.textContent = 'Stimmen aufgedeckt'; // GERMAN
                        revealButton.disabled = true;
                    }
                 });
            }
        }


        // Handle Reset button click
        async function handleReset() {
            if (!participantsRef || !roomRef) return;
            clearInterval(countdownInterval);
            try {
                const updates = {};
                updates['/revealed'] = false;
                updates['/revealCountdownEnd'] = null;
                const snapshot = await participantsRef.once('value');
                const participants = snapshot.val() || {};
                Object.keys(participants).forEach(id => {
                    updates[`/participants/${id}/vote`] = null;
                    updates[`/participants/${id}/hasVoted`] = false;
                });
                await roomRef.update(updates);
                resultsSummarySection.classList.add('hidden');
            } catch (error) {
                console.error("Error resetting votes:", error);
                showInPageAlert('Zurücksetzen der Stimmen fehlgeschlagen.', 'error'); // Use new alert
            }
        }

         // Handle Kick User button click
        async function handleKickUser(userIdToKick) {
            if (!kickedUsersRef || !userIdToKick || userIdToKick === currentUserId) return;
            try {
                await database.ref(`rooms/${currentRoomId}/kickedUsers/${userIdToKick}`).set(true);
                await database.ref(`rooms/${currentRoomId}/participants/${userIdToKick}`).remove();
                console.log(`User ${userIdToKick} kicked.`);
            } catch (error) {
                console.error("Error kicking user:", error);
                showInPageAlert('Benutzer konnte nicht entfernt werden.', 'error'); // Use new alert (updated text)
            }
        }


        // Update state of Reveal and Reset buttons
        function updateActionButtons(participants, revealed, countdownEndTime) {
             const hasParticipants = Object.keys(participants).length > 0;

             if (revealed) {
                 // Votes are revealed: Hide Reveal, Show Reset
                 revealButton.classList.add('hidden');
                 resetButton.classList.remove('hidden');
                 resetButton.disabled = false; // Enable reset button
             } else {
                 // Votes are not revealed: Show Reveal, Hide Reset
                 revealButton.classList.remove('hidden');
                 resetButton.classList.add('hidden');

                 // Handle reveal button state (disabled during countdown or if no participants)
                 if (countdownEndTime && countdownEndTime > Date.now()) {
                     revealButton.disabled = true;
                 } else {
                     revealButton.textContent = 'Stimmen aufdecken'; // GERMAN
                     revealButton.disabled = !hasParticipants;
                 }
             }

             // Disable buttons during countdown regardless of revealed state
             if (countdownEndTime && countdownEndTime > Date.now()) {
                resetButton.disabled = true; // Also disable reset during countdown
             }
        }

        // Render the results summary (average, distribution)
        function renderResults(participants, revealed) {
            if (!revealed) {
                resultsSummarySection.classList.add('hidden');
                return;
            }

            // Always show the results section if revealed is true
            resultsSummarySection.classList.remove('hidden');

            // Get all votes, filtering out both null and undefined rigorously
            const votes = Object.values(participants).map(p => p.vote).filter(v => v != null);

            if (votes.length === 0) {
                // No votes cast, show placeholder
                 // GERMAN: Durchschnitt & Kein Ergebnis
                 // Use same text size (text-4xl) as the actual average for consistency
                averageVoteDisplay.innerHTML = `<span class="text-base font-semibold text-gray-700 block mb-1">Durchschnitt</span><span class="text-3xl font-bold text-gray-500 block mb-1">-</span>`;
                voteDistributionDisplay.innerHTML = '<p class="text-gray-500 italic">Keine Stimmen abgegeben.</p>'; // GERMAN
                voteDistributionDisplay.className = 'flex justify-center items-center mt-4'; // Reset classes
                return; // Stop further processing
            }

            // Calculate Average
            const numericVotes = votes.map(v => parseFloat(v)).filter(v => !isNaN(v));
            let average = '-';
            if (numericVotes.length > 0) {
                const sum = numericVotes.reduce((a, b) => a + b, 0);
                average = (sum / numericVotes.length).toFixed(1);
            }

            // Calculate Min/Max and Check Consensus
            let minVote = '-';
            let maxVote = '-';
            let consensusReached = false;
            if (numericVotes.length > 0) {
                minVote = Math.min(...numericVotes);
                maxVote = Math.max(...numericVotes);
                // Consensus is reached if all numeric votes are the same (min === max)
                consensusReached = minVote === maxVote;
            }

            // Build HTML for the average/min/max/consensus section
            let averageHTML = `
                <span class="text-base font-semibold text-gray-700 block mb-1">Durchschnitt</span>
                <span class="text-4xl font-bold text-blue-600 block mb-1">${average}</span>
                <span class="text-xs text-gray-600 block">(Min: ${minVote}, Max: ${maxVote})</span>
            `;

            if (consensusReached) {
                averageHTML += `<span class="text-green-600 font-medium mt-2 block text-sm">Konsens erreicht!</span>`; // Smaller text, less bold
            }

            averageVoteDisplay.innerHTML = averageHTML;

            // Calculate Distribution
            const distribution = votes.reduce((acc, vote) => {
                acc[vote] = (acc[vote] || 0) + 1;
                return acc;
            }, {});

            voteDistributionDisplay.innerHTML = ''; // Clear previous distribution
             // Ensure the container is a flex container for alignment
            voteDistributionDisplay.className = 'flex flex-wrap justify-center items-center gap-4 mt-4';

            Object.entries(distribution)
                .sort(([valA], [valB]) => {
                    // Consistent sorting (numbers first, then '?', then '☕')
                    const numA = parseFloat(valA); const numB = parseFloat(valB);
                    if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
                    if (!isNaN(numA)) return -1;
                    if (!isNaN(numB)) return 1;
                    if (valA === '?') return -1;
                    if (valB === '?') return 1;
                    if (valA === '☕') return 1; // Place coffee last
                    if (valB === '☕') return -1;
                    return valA.localeCompare(valB); // Fallback for other non-numeric
                })
                .forEach(([vote, count]) => {
                // Create the styled box using Tailwind
                const div = document.createElement('div');
                div.className = 'flex flex-col items-center justify-center p-4 border border-gray-300 rounded-md bg-white shadow-sm min-w-[80px] h-[90px]'; // Adjusted size and padding

                // Vote value (large)
                const voteValueEl = document.createElement('span');
                voteValueEl.className = 'text-2xl font-semibold text-gray-800'; // Adjusted size
                voteValueEl.textContent = vote === '☕' ? '☕' : vote;

                // Vote count (smaller, below)
                const voteCountEl = document.createElement('span');
                voteCountEl.className = 'text-xs text-gray-500 mt-1'; // Adjusted size and margin
                // GERMAN translation for vote(s)
                voteCountEl.textContent = `${count} ${count > 1 ? 'Stimmen' : 'Stimme'}`;

                div.appendChild(voteValueEl);
                div.appendChild(voteCountEl);
                voteDistributionDisplay.appendChild(div);
            });
        }


        // Copy invite link to clipboard
        function copyInviteLink() {
            const link = `${window.location.origin}${window.location.pathname}#${currentRoomId}`;
            navigator.clipboard.writeText(link).then(() => {
                copyLinkFeedback.classList.remove('hidden');
                setTimeout(() => {
                    copyLinkFeedback.classList.add('hidden');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy link: ', err);
                showInPageAlert('Link konnte nicht kopiert werden.', 'error'); // Use new alert
            });
        }

        // Clean up listeners and state
        function cleanupRoomListeners() {
             if (roomRef) roomRef.off();
             if (kickedUsersRef && currentUserId) {
                 const userKickedRef = database.ref(`rooms/${currentRoomId}/kickedUsers/${currentUserId}`);
                 userKickedRef.off();
             }
             if (userRef) userRef.onDisconnect().cancel();
             clearInterval(countdownInterval);
             roomRef = null; participantsRef = null; kickedUsersRef = null; userRef = null;
        }

        function cleanupAndRedirect() {
            cleanupRoomListeners();
            currentRoomId = null; currentUsername = null;
            sessionStorage.removeItem('planningPokerLastRoomId');
            window.location.hash = '';
            showScreen(createRoomScreen);
        }


        // --- Event Listeners ---
        createRoomButton.addEventListener('click', handleCreateRoom);
        joinRoomButton.addEventListener('click', handleJoinRoom);
        revealButton.addEventListener('click', handleRevealVotes);
        resetButton.addEventListener('click', handleReset);
        copyLinkButton.addEventListener('click', copyInviteLink);

        // Add Enter key listener for room name input
        roomNameInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault(); // Prevent default form submission if any
                createRoomButton.click(); // Trigger the button click
            }
        });

        // Add Enter key listener for display name input
        displayNameInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault(); // Prevent default form submission if any
                joinRoomButton.click(); // Trigger the button click
            }
        });

        // --- Initialization ---
        function initializeApp() {
            lucide.createIcons();
            let hash = window.location.hash.substring(1);
            const lastRoomId = sessionStorage.getItem('planningPokerLastRoomId');
            currentUserId = sessionStorage.getItem('planningPokerUserId'); // Ensure userId is loaded early

            let initialRoomIdToLoad = null; // Determine the target room ID first

            if (hash) {
                initialRoomIdToLoad = hash;
            } else if (lastRoomId && currentUserId) {
                console.log('No hash, attempting to use last known room:', lastRoomId);
                initialRoomIdToLoad = lastRoomId;
                // Don't set window.location.hash here - handle internally
            }

            if (initialRoomIdToLoad) {
                currentRoomId = initialRoomIdToLoad; // Set currentRoomId EARLY
                console.log('Attempting to load room:', currentRoomId);
                showScreen(enterNameScreen); // Show screen before async checks

                // Now proceed with checks for kicked/existence
                 database.ref(`rooms/${currentRoomId}/kickedUsers/${currentUserId}`).once('value').then(snapshot => {
                    if (snapshot.exists() && snapshot.val() === true) {
                        // Kicked - clear stored ID and show kicked screen
                        sessionStorage.removeItem('planningPokerLastRoomId');
                        showScreen(kickedOutScreen);
                    } else {
                        // Not kicked, check if room exists
                        database.ref(`rooms/${currentRoomId}`).once('value', roomSnapshot => {
                            if (roomSnapshot.exists()) {
                                // Room exists, user not kicked - stay on enterNameScreen
                            } else {
                                // Room doesn't exist - show error, clear IDs, stay on screen, disable join
                                showInPageAlert("Der Raum, dem du beitreten wolltest, existiert nicht oder wurde gelöscht.", 'error');
                                window.location.hash = ''; // Clear hash if it was invalid
                                currentRoomId = null; // Clear internal ID
                                sessionStorage.removeItem('planningPokerLastRoomId');
                                joinRoomButton.disabled = true;
                            }
                        }).catch(error => {
                             // Error checking room - show error, clear IDs, stay on screen, disable join
                             console.error("Error checking room existence:", error);
                             showInPageAlert("Der Raum konnte nicht überprüft werden. Bitte versuche es erneut.", 'error');
                             window.location.hash = '';
                             currentRoomId = null;
                             sessionStorage.removeItem('planningPokerLastRoomId');
                             joinRoomButton.disabled = true;
                        });
                    }
                 }).catch(error => {
                      // Error checking kicked status - show error, clear IDs, stay on screen, disable join
                      console.error("Error checking kicked status:", error);
                      showInPageAlert("Konnte den Status nicht überprüfen. Bitte versuche es erneut.", 'error');
                       window.location.hash = '';
                       currentRoomId = null;
                       sessionStorage.removeItem('planningPokerLastRoomId');
                       joinRoomButton.disabled = true;
                 });
            } else {
                // No hash and no last room ID, show create screen
                showScreen(createRoomScreen);
            }

             // Revised hashchange listener
             window.addEventListener('hashchange', () => {
                const newHash = window.location.hash.substring(1);
                console.log('Hash changed event. New hash:', newHash, 'Current Room ID was:', currentRoomId);

                // Only redirect to create if hash becomes empty AND we *were* previously in a known room
                if (!newHash && currentRoomId) {
                     console.log("Hash cleared externally while in a room, redirecting to create screen.");
                     // Make sure we are not already on create/kicked screens before redirecting
                     if (createRoomScreen.classList.contains('hidden') && kickedOutScreen.classList.contains('hidden')) {
                          cleanupAndRedirect();
                     }
                } 
                // Optional: Handle navigating to a different room? 
                // else if (newHash && currentRoomId && newHash !== currentRoomId) {
                //    console.log("Navigating to a different room hash...");
                //    cleanupAndRedirect(); // Or reload the page?
                // }
            });
        }
        initializeApp();
    </script>
