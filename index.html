<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Poker</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, onDisconnect, remove, update, serverTimestamp, get, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyABZ2rEEwDsGUNQ475Iq_RzfqYlMqUEW-M", 
            authDomain: "planningpoker-115b0.firebaseapp.com",
            databaseURL: "https://planningpoker-115b0-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "planningpoker-115b0",
            storageBucket: "planningpoker-115b0.appspot.com", 
            messagingSenderId: "883176222007",
            appId: "1:883176222007:web:b18ea07bdf0733bd557eb2"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // --- Global Variables ---
        let currentRoomId = null;
        let currentUserId = null;
        let currentUserName = null;
        let participantsListener = null;
        let messageTimeoutId = null;
        let isRevealCountdownActive = false;
        let animationsListener = null; // <<< Ensure this is declared globally
        let openPanelUserId = null; // Global state
        const sharedTooltipElement = document.getElementById('sharedTooltip');

        // --- DOM Elements ---
        const loadingScreen = document.getElementById('loadingScreen'); // <<< Added loading screen
        const createRoomScreen = document.getElementById('createRoomScreen');
        const joinRoomScreen = document.getElementById('joinRoomScreen');
        const pokerRoomScreen = document.getElementById('pokerRoomScreen');
        const kickedOutScreen = document.getElementById('kickedOutScreen'); // <<< ADD
        const roomNameInput = document.getElementById('roomNameInput');
        const createRoomButton = document.getElementById('createRoomButton');
        const displayNameInput = document.getElementById('displayNameInput');
        const joinRoomButton = document.getElementById('joinRoomButton');
        const roomNameDisplay = document.getElementById('roomNameDisplay');
        // const shareLink = document.getElementById('shareLink'); // No longer needed
        const participantsList = document.getElementById('participantsList');
        const votingCards = document.getElementById('votingCards');
        const revealButton = document.getElementById('revealButton');
        const resetButton = document.getElementById('resetButton');
        const resultsSummary = document.getElementById('resultsSummary');
        const messageBox = document.getElementById('messageBox');
        const messageText = document.getElementById('messageText');
        const closeMessageButton = document.getElementById('closeMessageButton');
        const copyLinkButton = document.getElementById('copyLinkButton'); // Added
        const countdownDisplay = document.getElementById('countdownDisplay'); // <<< Get countdown element
        const countdownText = countdownDisplay?.querySelector('span'); // <<< Get span inside

        // --- Constants ---
        const VOTE_OPTIONS = ['0', '0.5', '1', '2', '3', '5', '8', '?', '☕'];

        // --- Functions ---

        // Display messages to the user (modified to allow different colors)
        function showMessage(message, type = 'error') {
            // Clear existing timeout if any
            if (messageTimeoutId) {
                clearTimeout(messageTimeoutId);
                messageTimeoutId = null;
            }

            messageText.textContent = message;
            messageBox.classList.remove('hidden', 'bg-red-100', 'border-red-300', 'text-red-800', 'bg-green-100', 'border-green-300', 'text-green-800');
            closeMessageButton.classList.remove('text-red-600', 'hover:text-red-800', 'text-green-600', 'hover:text-green-800');

            if (type === 'success') {
                messageBox.classList.add('bg-green-100', 'border-green-300', 'text-green-800');
                closeMessageButton.classList.add('text-green-600', 'hover:text-green-800');
            } else { // Default to error
                messageBox.classList.add('bg-red-100', 'border-red-300', 'text-red-800');
                closeMessageButton.classList.add('text-red-600', 'hover:text-red-800');
            }

            // Automatically hide after 4 seconds
            messageTimeoutId = setTimeout(() => {
                 messageBox.classList.add('hidden');
                 messageTimeoutId = null; // Clear the tracker
            }, 4000);
        }

        // Hide the message box
        closeMessageButton.addEventListener('click', () => {
            messageBox.classList.add('hidden');
            // Also clear the timeout if closed manually
             if (messageTimeoutId) {
                clearTimeout(messageTimeoutId);
                messageTimeoutId = null;
            }
        });

        // Generate a simple unique ID (for room creation)
        function generateUniqueId() {
            // Generates a random alphanumeric string
            return Math.random().toString(36).substring(2, 9);
        }

        // Get User ID from Session Storage or generate a new one
        function getUserId() {
            let userId = sessionStorage.getItem('planningPokerUserId');
            if (!userId) {
                // Using push().key generates a unique ID similar to Firebase's auto-IDs
                // This ensures a unique ID for the session
                userId = push(ref(database)).key;
                sessionStorage.setItem('planningPokerUserId', userId);
            }
            return userId;
        }

        // Update UI based on current screen (which view to show)
        function showScreen(screenToShow) {
            // Hide all screens first (including loader)
            loadingScreen.classList.add('hidden'); // <<< Hide loader
            createRoomScreen.classList.add('hidden');
            joinRoomScreen.classList.add('hidden');
            pokerRoomScreen.classList.add('hidden');
            kickedOutScreen.classList.add('hidden'); // <<< ADD

            // Manage visibility of copy link button
            const copyBtn = document.getElementById('copyLinkButton');
            if (screenToShow === pokerRoomScreen) {
                copyBtn?.classList.remove('hidden'); // Show copy button only in the poker room
            } else {
                copyBtn?.classList.add('hidden'); // Hide copy button on create/join screens
            }

            // Show the target screen
            screenToShow.classList.remove('hidden');

            // <<< Added: Auto-focus input field >>>
            setTimeout(() => {
                if (screenToShow === createRoomScreen) {
                    roomNameInput.focus();
                } else if (screenToShow === joinRoomScreen) {
                    displayNameInput.focus();
                }
            }, 50); // Small delay to ensure element is visible before focusing
        }

        // Handle URL changes (hash changes for room navigation)
        function handleRouteChange() {
            const hash = window.location.hash.substring(1); // Get room ID from URL hash (e.g., #roomId)

            loadingScreen.classList.remove('hidden'); // <<< Show loader initially
            createRoomScreen.classList.add('hidden');   // <<< Hide others explicitly
            joinRoomScreen.classList.add('hidden');     // <<< Hide others explicitly
            pokerRoomScreen.classList.add('hidden');    // <<< Hide others explicitly

            if (hash) {
                // If there's a hash, attempt to join the room
                currentRoomId = hash;
                // Check if the room actually exists in Firebase before proceeding
                const roomRef = ref(database, `rooms/${currentRoomId}`);
                get(roomRef).then((snapshot) => {
                    if (snapshot.exists()) {
                        // Room exists, show the join screen to enter display name
                        const roomData = snapshot.val();
                        roomNameDisplay.textContent = roomData.roomName || 'Planning Poker'; // Display the fetched room name
                        showScreen(joinRoomScreen); // <<< Show join screen (hides loader)
                    } else {
                        // Room specified in hash doesn't exist
                        showMessage(`Raum "${currentRoomId}" nicht gefunden. Du kannst einen neuen Raum erstellen.`); // Translated
                        window.location.hash = ''; // Clear the invalid hash
                        sessionStorage.removeItem('planningPokerUserId'); // Clear stored user ID if returning to create screen
                        sessionStorage.removeItem('planningPokerUserName'); // <<< ADD: Clear stored user name
                        showScreen(createRoomScreen); // <<< Show create screen (hides loader)
                    }
                }).catch(error => {
                    // Handle errors during Firebase read
                    console.error("Error checking room:", error);
                    showMessage("Fehler beim Prüfen des Raums."); // Translated
                    window.location.hash = ''; // Clear hash on error
                    sessionStorage.removeItem('planningPokerUserId'); // Clear stored user ID if returning to create screen
                    sessionStorage.removeItem('planningPokerUserName'); // <<< ADD: Clear stored user name
                    showScreen(createRoomScreen); // <<< Show create screen (hides loader)
                });
            } else {
                // No hash in URL, show the initial screen to create a room
                currentRoomId = null;
                currentUserId = null;
                currentUserName = null;
                sessionStorage.removeItem('planningPokerUserId'); // Clear stored user ID if returning to create screen
                sessionStorage.removeItem('planningPokerUserName'); // <<< ADD: Clear stored user name
                showScreen(createRoomScreen); // <<< Show create screen (hides loader)
            }
        }

        // Create a new poker room in Firebase
        createRoomButton.addEventListener('click', () => {
            const roomName = roomNameInput.value.trim();
            if (!roomName) {
                showMessage("Bitte gib einen Raumnamen ein."); // Translated
                return; // Prevent creating room without a name
            }
            const newRoomId = generateUniqueId(); // Generate a new ID for the room
            const roomRef = ref(database, `rooms/${newRoomId}`);
            // Set initial data for the new room in Firebase
            set(roomRef, {
                roomName: roomName,
                votesRevealed: false, // Votes start hidden
                countdownValue: null, // <<< ADDED: Initialize countdown value
                createdAt: serverTimestamp() // Optional: record when the room was created
            }).then(() => {
                // Successfully created room, navigate to it by setting the hash
                window.location.hash = newRoomId; // This triggers handleRouteChange -> show join screen
            }).catch(error => {
                // Handle errors during Firebase write
                console.error("Error creating room: ", error);
                showMessage("Raumerstellung fehlgeschlagen. Bitte versuche es erneut."); // Translated
            });
        });

        // Join an existing room (after entering display name)
        joinRoomButton.addEventListener('click', () => {
            const displayName = displayNameInput.value.trim();
            if (!displayName) {
                showMessage("Bitte gib deinen Anzeigenamen ein.");
                return;
            }
            if (displayName.length > 30) {
                 showMessage("Dein Anzeigename darf maximal 30 Zeichen lang sein.");
                 return; // Verhindert den Firebase-Aufruf
            }
            if (!currentRoomId) {
                // This should ideally not happen if navigated correctly, but check anyway
                showMessage("Keine Raum-ID angegeben. Beitritt nicht möglich."); // Translated
                return;
            }

            currentUserName = displayName;
            currentUserId = getUserId(); // Get existing or generate new user ID for the session

            // <<< ADD: Store username in sessionStorage >>>
            sessionStorage.setItem('planningPokerUserName', currentUserName);

            // Reference to the specific user within the room's participants list in Firebase
            const userRef = ref(database, `rooms/${currentRoomId}/participants/${currentUserId}`);

            // Add the user to the room's participants list
            set(userRef, {
                name: currentUserName,
                vote: null, // Initial vote is null
                hasVoted: false // User hasn't voted yet
            }).then(() => {
                // Successfully joined, now set up listener for real-time updates
                listenToRoomChanges(currentRoomId);

                // Set up Firebase's onDisconnect handler
                // This ensures the user is removed from the participants list if they close the tab/browser
                onDisconnect(userRef).remove();

                // Show the main poker room view
                showScreen(pokerRoomScreen);
                // shareLink.value = window.location.href; // No longer needed

                // Render the initial set of voting cards
                renderVotingCards(null); // No card selected initially

            }).catch(error => {
                // Handle errors during Firebase write
                console.error("Error joining room: ", error);
                showMessage("Raumbeitritt fehlgeschlagen. Bitte versuche es erneut."); // Translated
            });
        });

        // Render the list of participants based on Firebase data
        function renderParticipants(participantsData, votesRevealed, currentUserVote, currentUserIdFromListener) {
            participantsList.innerHTML = ''; // Clear previous participant list
            if (!participantsData) return; // Exit if no participant data

            const participantIds = Object.keys(participantsData);
            let numericVotes = [];
            let voteSum = 0;
            let voteCount = 0;

            participantIds.forEach(userId => {
                const participant = participantsData[userId];
                const isCurrentUser = userId === currentUserIdFromListener;

                const participantWrapper = document.createElement('div');
                participantWrapper.className = 'relative group flex-shrink-0';

                const participantContainer = document.createElement('div');
                participantContainer.id = `container-${userId}`; // <<< RE-ADD ID for animation target
                participantContainer.className = 'relative flex flex-col items-center'; // Keep relative
                const participantElement = document.createElement('div');
                participantElement.id = `card-${userId}`;
                const nameElement = document.createElement('div');
                const statusElement = document.createElement('div');

                // --- Determine styling based on state (for the card) ---
                let cardBgBorderClasses = '';
                let statusColorClass = 'text-gray-800';
                let statusContent = '';

                if (votesRevealed) {
                    cardBgBorderClasses = 'bg-white border-gray-300';
                    statusContent = participant.vote ?? '-';
                    statusColorClass = 'text-gray-800';
                    if (participant.vote !== null && !isNaN(parseFloat(participant.vote))) {
                        const voteValue = parseFloat(participant.vote);
                        numericVotes.push(voteValue);
                        voteSum += voteValue;
                        voteCount++;
                    }
                } else {
                    if (participant.hasVoted) {
                        cardBgBorderClasses = 'bg-blue-500 border-blue-700';
                        statusColorClass = '';
                        statusContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-6 h-6 text-white"><path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" /></svg>`;
                    } else {
                        cardBgBorderClasses = 'bg-gray-200 border-gray-400';
                        statusColorClass = 'text-gray-700';
                        statusContent = '?';
                    }
                }
                // --- Apply classes and content ---
                nameElement.textContent = participant.name;
                nameElement.className = `text-xs font-medium text-center w-16 truncate mb-1 text-gray-800 ${isCurrentUser ? 'font-bold' : ''}`;
                participantElement.className = `flex items-center justify-center p-1 rounded-lg shadow-sm w-16 h-24 border-2 transition-colors duration-150 ${cardBgBorderClasses}`;
                statusElement.className = `text-lg font-semibold ${statusColorClass}`;
                statusElement.innerHTML = statusContent;

                // --- Append elements ---
                participantContainer.appendChild(nameElement);
                participantElement.appendChild(statusElement);
                participantContainer.appendChild(participantElement);

                // <<< Add Reaction Panels (only for other users) >>>
                if (!isCurrentUser) {
                    // Create a wrapper for both panels to control hover visibility
                    const panelsWrapper = document.createElement('div');
                    panelsWrapper.className = 'panels-wrapper'; // Use this for hover trigger
                    panelsWrapper.dataset.userId = userId; // Add dataset for lookup early
                    panelsWrapper.dataset.hideTimer = null; // Init timer state early

                    // <<< DEFINE Timer functions FIRST >>>
                    const clearPanelTimer = () => {
                        const timerId = parseInt(panelsWrapper.dataset.hideTimer);
                        if (!isNaN(timerId)) { clearTimeout(timerId); }
                        panelsWrapper.dataset.hideTimer = null;
                    };

                    const startPanelHideTimer = () => {
                        if (openPanelUserId === userId) return; // DON'T HIDE IF LOCKED!
                        clearPanelTimer(); // Clear any existing timer first
                        const timerId = setTimeout(() => {
                            panelsWrapper.classList.remove('visible');
                            panelsWrapper.dataset.hideTimer = null; 
                        }, 500); // 500ms delay
                        panelsWrapper.dataset.hideTimer = timerId;
                    };

                    // Emoji Panel
                    const emojiPanel = document.createElement('div');
                    emojiPanel.className = 'emoji-panel'; // New class
                    const emojis = ['🎯', '✈️', '📄', '❤️'];
                    emojis.forEach(emoji => {
                        const emojiSpan = document.createElement('span');
                        emojiSpan.className = 'reaction-emoji';
                        emojiSpan.textContent = emoji;
                        // emojiSpan.dataset.tooltipText = `Sende ${emoji}`; // <<< REMOVE Tooltip text

                        emojiSpan.addEventListener('click', (e) => {
                             e.stopPropagation(); // Prevent closing via global listener
                             openPanelUserId = userId; // LOCK OPEN
                             panelsWrapper.classList.add('visible'); // Ensure visible
                             sendEmojiAnimationEvent(userId, emoji);
                        });
                        /* // <<< REMOVE Tooltip Listeners >>>
                        emojiSpan.addEventListener('mouseenter', () => {
                            customTooltip.textContent = emojiSpan.dataset.tooltipText;
                            customTooltip.classList.add('visible');
                        });
                         emojiSpan.addEventListener('mouseleave', () => { 
                             customTooltip.classList.remove('visible');
                         }); 
                        */
                        emojiPanel.appendChild(emojiSpan);
                    });
                    panelsWrapper.appendChild(emojiPanel); // Add emoji panel to wrapper

                    // Kick Panel (Separate)
                    const kickPanel = document.createElement('div');
                    kickPanel.className = 'kick-panel'; // New class
                    const kickButton = document.createElement('span');
                    // kickButton.dataset.tooltipText = `"${participant.name}" entfernen`; // <<< REMOVE Tooltip text
                    kickButton.dataset.kickUserId = userId;
                    kickButton.dataset.kickUserName = participant.name;
                    kickButton.className = 'kick-button-style';
                    // <<< REPLACE SVG with X Mark >>>
                    kickButton.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                        </svg>
                    `;
                    kickButton.addEventListener('click', (e) => {
                        e.stopPropagation(); // Prevent closing via global listener
                        openPanelUserId = userId; // LOCK OPEN
                        panelsWrapper.classList.add('visible'); // Ensure visible
                        handleKickParticipant(e); 
                    });
                    /* // <<< REMOVE Tooltip Listeners >>>
                    kickButton.addEventListener('mouseenter', () => {
                        customTooltip.textContent = kickButton.dataset.tooltipText;
                        customTooltip.classList.add('visible');
                    });
                    kickButton.addEventListener('mouseleave', () => {
                         customTooltip.classList.remove('visible');
                    });
                    */
                    kickPanel.appendChild(kickButton); // Add button to kick panel
                    panelsWrapper.appendChild(kickPanel); // Add kick panel to wrapper

                    // Add visible class during render if this panel is the locked one
                    if (userId === openPanelUserId) {
                        panelsWrapper.classList.add('visible');
                    }

                    participantContainer.appendChild(panelsWrapper); // Append the main wrapper

                    // <<< REMOVE Timer definitions from here >>>
                    /* 
                    panelsWrapper.dataset.hideTimer = null; 
                    const clearPanelTimer = () => { ... };
                    const startPanelHideTimer = () => { ... };
                    */

                    // <<< ADD Hover listeners >>>
                     participantWrapper.addEventListener('mouseenter', () => {
                        clearPanelTimer();
                        panelsWrapper.classList.add('visible');
                    });
                    participantWrapper.addEventListener('mouseleave', startPanelHideTimer);

                    panelsWrapper.addEventListener('mouseenter', clearPanelTimer);
                    panelsWrapper.addEventListener('mouseleave', startPanelHideTimer);
                    
                    // Keep stop propagation for clicks directly on the panel background
                    panelsWrapper.addEventListener('click', (e) => {
                         e.stopPropagation();
                    });
                }

                 participantWrapper.appendChild(participantContainer);
                 participantsList.appendChild(participantWrapper);
            });

            // Update and show the results summary section if votes are revealed
            if (votesRevealed) {
                resultsSummary.classList.remove('hidden'); // Make summary visible
                let summaryHtml = '<h3 class="text-lg font-semibold mb-2 text-center">Durchschnitt</h3>'; // Title

                let minVote = null;
                let maxVote = null;
                let hasNonNumericVote = false; // <<< Flag for non-numeric votes

                // Calculate stats and check for non-numeric votes *before* building summaryHTML
                if (voteCount > 0) {
                     minVote = Math.min(...numericVotes);
                     maxVote = Math.max(...numericVotes);
                 }
                // Check all participants who voted for non-numeric votes
                participantIds.forEach(userId => {
                    const participant = participantsData[userId];
                    if (participant.hasVoted && participant.vote !== null) {
                        if (isNaN(parseFloat(participant.vote))) {
                            hasNonNumericVote = true;
                        }
                    }
                });

                if (voteCount > 0) {
                    const average = (voteSum / voteCount).toFixed(1);
                    summaryHtml += `<div class="text-center mb-2"><span class="font-bold text-3xl text-blue-600">${average}</span></div>`; // Changed text-xl to text-3xl
                    summaryHtml += `<div class="text-xs text-gray-600 text-center">(Min: ${minVote}, Max: ${maxVote})</div>`; // Kept Min/Max

                    // Check for consensus: requires numeric votes, all same, no non-numeric votes cast,
                    // AND everyone must have cast a numeric vote.
                    if (voteCount > 0 && new Set(numericVotes).size === 1 && !hasNonNumericVote && voteCount === participantIds.length) {
                         summaryHtml += `<div class="mt-2 text-center text-green-600 font-semibold">Konsens erreicht!</div>`; // Translated
                    }

                } else {
                    // Message if no numeric votes were cast
                    summaryHtml += `<div class="text-center text-gray-500">Keine Stimmen abgegeben.</div>`; // Translated
                }
                 resultsSummary.innerHTML = summaryHtml; // Update the DOM

                // --- Highlight Min/Max Cards ---
                // Iterate through the already rendered participant wrappers/cards
                 const participantWrappers = participantsList.querySelectorAll(':scope > div'); // Get the outer wrappers
                 participantWrappers.forEach((wrapper, index) => {
                    const cardElement = wrapper.querySelector(':scope > div > div:nth-child(2)'); // Find the card element inside
                    if (!cardElement) return; // Skip if structure isn't as expected

                    const userId = participantIds[index]; // Get corresponding userId
                    const participant = participantsData[userId];
                    if (participant && participant.vote !== null && !isNaN(parseFloat(participant.vote))) {
                        const voteValue = parseFloat(participant.vote);
                        // Remove potential old highlights first
                        cardElement.classList.remove('border-yellow-500', 'ring-2', 'ring-yellow-200');

                        if (voteCount > 1 && new Set(numericVotes).size > 1) { // Only highlight if more than one vote and they differ
                             // Highlight both min and max with yellow
                             if (voteValue === minVote || voteValue === maxVote) {
                                cardElement.classList.add('border-yellow-500', 'ring-2', 'ring-yellow-200');
                             }
                        }
                    }
                });
                 // ------------------------------

            } else {
                // Hide results summary if votes are not revealed
                resultsSummary.classList.add('hidden');
                resultsSummary.innerHTML = ''; // Clear previous summary content
            }

            // Re-render voting cards to correctly show the current user's selection based on latest data
             renderVotingCards(currentUserVote);
        }

        // Render the clickable voting cards
        function renderVotingCards(selectedVote) {
            votingCards.innerHTML = ''; // Clear previous cards
            // Loop through the predefined vote options
            VOTE_OPTIONS.forEach(option => {
                const cardButton = document.createElement('button');
                cardButton.textContent = option; // Display vote value on card
                cardButton.dataset.vote = option; // Store vote value in data attribute for easy access
                // Style the card button: SMALLER SIZE, Fixed size, flex centered, layout, and interaction styles
                cardButton.className = `
                    p-1 m-1 border-2 rounded-lg shadow hover:shadow-md transition-all duration-150
                    flex items-center justify-center text-lg font-semibold w-16 h-24 /* <-- Smaller Fixed size */
                    bg-white border-gray-300 hover:border-blue-500 focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-blue-400
                `; // Smaller w-16 h-24, p-1, text-lg

                // Apply selected style if this card matches the user's current vote
                if (option === selectedVote) {
                    cardButton.classList.remove('bg-white', 'border-gray-300');
                    cardButton.classList.add('bg-blue-500', 'text-white', 'border-blue-700', 'ring-2', 'ring-offset-1', 'ring-blue-400');
                }

                // Add click listener to handle vote selection
                cardButton.addEventListener('click', handleVoteSelection);
                votingCards.appendChild(cardButton); // Add card to the DOM
            });
        }

        // Handle clicking a voting card
        function handleVoteSelection(event) {
            // Ensure user and room context is available
            if (!currentUserId || !currentRoomId) return;

            const selectedVote = event.target.dataset.vote; // Get vote value from clicked card
            const userRef = ref(database, `rooms/${currentRoomId}/participants/${currentUserId}`);

            // <<< ADD: Get username reliably (e.g., from sessionStorage) >>>
            const userNameFromStorage = sessionStorage.getItem('planningPokerUserName') || 'Unknown'; // Fallback added

            // Check current vote to see if user is deselecting
            get(userRef).then(snapshot => {
                const currentData = snapshot.val();
                let newVote = selectedVote;
                let newHasVoted = true;

                // If user clicks the card that is already selected, deselect it
                if (currentData && currentData.vote === selectedVote) {
                    newVote = null; // Reset vote
                    newHasVoted = false; // Mark as not voted
                }

                // Update user's vote and status in Firebase
                // <<< ADD name to the update object >>>
                update(userRef, {
                    name: userNameFromStorage, // Ensure name is present/re-added
                    vote: newVote,
                    hasVoted: newHasVoted
                }).catch(error => {
                    console.error("Error updating vote:", error);
                    showMessage("Stimmabgabe fehlgeschlagen."); // Translated
                });

                // Immediately update the card UI for better responsiveness (Firebase update will follow)
                renderVotingCards(newVote);
            });
        }

        // Handle Reveal Votes button click with Firebase-synced countdown
        revealButton.addEventListener('click', () => {
            if (!currentRoomId || revealButton.disabled) return; // Prevent action if no room or already processing

            const roomRef = ref(database, `rooms/${currentRoomId}`);
            const startCountdownValue = 3;

            // Immediately disable button locally for responsiveness
            revealButton.disabled = true;

            // 1. Set initial countdown value in Firebase
            update(roomRef, { countdownValue: startCountdownValue })
                .then(() => {
                    // 2. Start interval ONLY on the client that clicked
                    let localCountdown = startCountdownValue;
                    const intervalId = setInterval(() => {
                        localCountdown--;

                        if (localCountdown > 0) {
                            // 3. Decrement value in Firebase
                            update(roomRef, { countdownValue: localCountdown })
                                .catch(error => {
                                     console.error("Error updating countdown:", error);
                                     clearInterval(intervalId); // Stop on error
                                     // Attempt to reset countdown state on error
                                     update(roomRef, { countdownValue: null }).catch(()=>{});
                                     // Button state will be corrected by the listener
                                });
                        } else {
                            // 4. Countdown finished: Reveal votes and clear countdown
                            clearInterval(intervalId);
                            update(roomRef, {
                                votesRevealed: true,
                                countdownValue: null
                            }).catch(error => {
                                 console.error("Error revealing votes after countdown:", error);
                                 showMessage("Fehler beim Aufdecken der Stimmen.");
                                 // Attempt to clear countdown state even on error
                                 update(roomRef, { countdownValue: null }).catch(()=>{});
                            });
                            // Listener will handle UI changes (hiding countdown, showing results etc.)
                        }
                    }, 1000); // Update every 1 second
                })
                .catch(error => {
                    console.error("Error starting countdown:", error);
                    showMessage("Fehler beim Starten des Countdowns.");
                     // Re-enable button if initial Firebase update fails
                    revealButton.disabled = false;
                });
        });

        // Handle Reset Votes / Start New Vote button click
        resetButton.addEventListener('click', () => {
            if (!currentRoomId) return;
            const roomRef = ref(database, `rooms/${currentRoomId}`);
            const updates = {}; // Object to hold all updates for atomic operation
            updates['votesRevealed'] = false; // Hide votes again
            updates['countdownValue'] = null; // <<< ADDED: Reset countdown value

             // Need to reset vote and hasVoted status for all participants
            const participantsRef = ref(database, `rooms/${currentRoomId}/participants`);
            get(participantsRef).then(snapshot => {
                if (snapshot.exists()) {
                    const participants = snapshot.val();
                    // Add updates for each participant to the updates object
                    Object.keys(participants).forEach(userId => {
                        updates[`participants/${userId}/vote`] = null;
                        updates[`participants/${userId}/hasVoted`] = false;
                    });
                }
                 // Apply all updates (reveal status, countdown reset, and participant resets) at once
                update(roomRef, updates)
                    .catch(error => console.error("Error resetting votes:", error));
                // The onValue listener will automatically update the UI
            }).catch(error => console.error("Error fetching participants for reset:", error));
        });

        // Listen for real-time changes in the room data in Firebase
        function listenToRoomChanges(roomId) {
            // Detach previous room listener
            if (participantsListener) {
                participantsListener();
                participantsListener = null;
            }
            // Detach previous animation listener <<< Check if it exists first >>>
             if (animationsListener) {
                 animationsListener(); // Assuming it returns unsubscribe function
                 animationsListener = null;
             }

            const roomRef = ref(database, `rooms/${roomId}`);

            participantsListener = onValue(roomRef, (snapshot) => {
                const currentUserIdFromStorage = getUserId();

                if (!snapshot.exists()) {
                     showMessage("Der Raum existiert nicht mehr.");
                     cleanupAndRedirect();
                     return;
                }

                 const roomData = snapshot.val();
                 const participants = roomData.participants || {};
                 const votesRevealed = roomData.votesRevealed || false;
                 const countdownValue = roomData.countdownValue; // <<< Get countdown value

                 const currentUserData = participants[currentUserIdFromStorage];

                 if (!currentUserData && currentUserIdFromStorage) {
                      cleanupBeforeKick();
                      showScreen(kickedOutScreen);
                      return;
                 }

                 const currentUserVote = currentUserData ? currentUserData.vote : null;

                 // --- UI Logic based on state ---

                 // <<< ADD element lookup INSIDE the callback >>>
                 const countdownDisplay = document.getElementById('countdownDisplay');
                 const countdownText = countdownDisplay?.querySelector('span');


                 // 1. Handle Countdown Active State
                 if (typeof countdownValue === 'number' && countdownValue > 0) {
                     revealButton.classList.add('hidden');
                     resetButton.classList.add('hidden');
                     resultsSummary.classList.add('hidden'); // Hide results during countdown
                     if (countdownDisplay && countdownText) {
                         countdownText.textContent = countdownValue;
                         countdownDisplay.classList.remove('hidden');
                     }
                     revealButton.disabled = true; // Ensure reveal stays disabled
                     resetButton.disabled = true; // Ensure reset stays disabled
                     // Re-render participants normally (showing who voted, not the value)
                     renderParticipants(participants, false, currentUserVote, currentUserIdFromStorage);
                     // Optionally disable voting cards during countdown?
                     // renderVotingCards(currentUserVote, true); // Pass a flag to disable

                 // 2. Handle Votes Revealed State
                 } else if (votesRevealed) {
                     revealButton.classList.add('hidden');
                     resetButton.classList.remove('hidden');
                     if (countdownDisplay) countdownDisplay.classList.add('hidden'); // Hide countdown display
                     
                     revealButton.disabled = true;
                     resetButton.disabled = false;
                     // Render participants WITH votes revealed
                     renderParticipants(participants, true, currentUserVote, currentUserIdFromStorage);
                     // Re-enable voting cards (or keep disabled based on UX choice)
                     // renderVotingCards(currentUserVote, false);

                 // 3. Handle Voting State (No countdown, Votes not revealed)
                 } else {
                     revealButton.classList.remove('hidden');
                     resetButton.classList.add('hidden');
                     resultsSummary.classList.add('hidden'); // Ensure results are hidden
                     if (countdownDisplay) countdownDisplay.classList.add('hidden'); // Hide countdown display

                     revealButton.disabled = false; // Enable reveal button
                     resetButton.disabled = true; // Disable reset button

                     // Render participants normally (showing who voted, not the value)
                      renderParticipants(participants, false, currentUserVote, currentUserIdFromStorage);
                      // Ensure voting cards are enabled
                      // renderVotingCards(currentUserVote, false);
                 }


                 // <<< NOTE: The existing logic inside renderParticipants for showing results only if
                 //     votesRevealed is true still works correctly. We are just controlling the
                 //     overall UI state (buttons, countdown visibility) here based on the new flow. >>>

             }, (error) => {
                 // Handle errors during listening (e.g., permission denied, network issues)
                 console.error("Error listening to room changes:", error);
                 showMessage("Verbindungsfehler. Bitte aktualisiere die Seite."); // Translated
                  if (participantsListener) {
                      participantsListener(); // Detach listener on error
                      participantsListener = null;
                  }
                  // Maybe redirect on error too? Optional.
                  // cleanupAndRedirect();
             });

             // --- Temporarily commenting out the animation listener attachment ---
               const animationsRef = ref(database, `rooms/${roomId}/animations`);
               animationsListener = onChildAdded(animationsRef, (snapshot) => {
                   const currentUserIdFromStorage = getUserId(); // Get current user ID inside listener
   
                   if (snapshot.exists()) {
                       const animationData = snapshot.val();
                       console.log("Received animation event:", animationData); // <<< ADDED: Logging
   
                       // --- Check Sender ---
                       // Only play if the event was sent by someone else
                       if (animationData.senderUserId && animationData.senderUserId !== currentUserIdFromStorage) {
                          console.log("Playing animation sent by other user"); // <<< ADDED: Logging
                          // playEmojiAnimationLocally(animationData.targetUserId, animationData.emojiChar);
                          const targetContainer = document.getElementById(`container-${animationData.targetUserId}`); // <<< Find target element
                          console.log('[listenToRoomChanges] Found target for remote play:', targetContainer); // <<< ADD LOG
                          if (targetContainer) {
                             triggerEmojiAnimation(targetContainer, animationData.emojiChar); // <<< Play locally
                          } else {
                             console.warn("Target container not found for animation", animationData.targetUserId);
                          }
                       } else {
                           console.log("Ignoring own animation event or missing senderId"); // <<< ADDED: Logging
                       }
                       // --- End Check Sender ---
    
                       // Temporarily removed timestamp check for debugging
                         // <<< This opens the inner block comment
                       // const now = Date.now();
                       // const eventTime = animationData.timestamp;
                       // if (eventTime && (now - eventTime > 5000)) {
                       //      if (now - eventTime > 60000) { remove(snapshot.ref).catch(()=>{}); }
                       //      return;
                       //  }
                        // <<< This closes the OUTER block comment prematurely
    
                   }
               }, (error) => {
                   console.error("Error listening for animations:", error);
               });
              
        }

        // Modify cleanupAndRedirect to also check before detaching animation listener
        function cleanupAndRedirect() {
            cleanupBeforeKick(); // <<< Call the common cleanup logic

             // ... (rest of cleanup) ...
              currentRoomId = null;
              currentUserId = null;
              currentUserName = null;
              sessionStorage.removeItem('planningPokerUserId');
              sessionStorage.removeItem('planningPokerUserName');

        function cleanupBeforeKick() {
            if (participantsListener) {
                participantsListener();

              if (animationsListener) {
                  animationsListener();

        // ***** NEW FUNCTION *****
        // Handle Copy Link button click
        function handleCopyLink() {
            const linkToCopy = window.location.href;
            navigator.clipboard.writeText(linkToCopy).then(() => {
                // Success feedback
                showMessage("Link in die Zwischenablage kopiert!", 'success'); // Translated
                // Optional: visual feedback on button
                const btn = document.getElementById('copyLinkButton');
                if(btn) {
                    const originalBg = btn.classList.contains('hover:bg-gray-200') ? 'hover:bg-gray-200' : null; // Store original hover state if needed
                    btn.classList.remove('hover:bg-gray-200');
                    btn.classList.add('bg-green-100'); // Temporary green background
                    setTimeout(() => {
                        btn.classList.remove('bg-green-100');

                    }, 1500); // Show feedback for 1.5 seconds
                }
            }).catch(err => {

                console.error('Failed to copy link: ', err);
                showMessage('Link konnte nicht kopiert werden. Bitte manuell kopieren.'); // Translated
            });
        }

        // ***** NEW FUNCTION *****
        // Handle kicking a participant
        function handleKickParticipant(event) {
            const button = event.currentTarget;
            const userIdToKick = button.dataset.kickUserId;
            const userNameToKick = button.dataset.kickUserName || 'diesen Teilnehmer'; // Fallback name

            if (!userIdToKick || !currentRoomId) {
                showMessage('Fehler: Benutzer-ID oder Raum-ID fehlt.');
                return;
            }

            // Optional: Confirmation dialog
            if (!confirm(`Möchtest du "${userNameToKick}" wirklich aus dem Raum entfernen?`)) {
                return; // User cancelled
            }

            const participantRefToRemove = ref(database, `rooms/${currentRoomId}/participants/${userIdToKick}`);

            remove(participantRefToRemove)
                .then(() => {
                    // Optional: Success feedback (though the UI will update automatically)
                    // showMessage(`"${userNameToKick}" wurde entfernt.`, 'success');
                    console.log(`Participant ${userIdToKick} removed.`);

                    console.error("Error removing participant:", error);
                    showMessage(`Entfernen von "${userNameToKick}" fehlgeschlagen.`);
                });
        }

        // ***** NEW FUNCTION *****
        // Trigger the emoji fly/bounce animation (Curved Center Target)
        function triggerEmojiAnimation(targetElement, emojiChar) {
            const flyingEmoji = document.createElement('span');
            flyingEmoji.textContent = emojiChar;
            flyingEmoji.className = 'emoji-animate'; 

            const targetRect = targetElement.getBoundingClientRect();
            if (!targetRect || targetRect.width === 0) {
                console.warn('[triggerEmojiAnimation] Invalid targetRect, aborting.');
                return;
            }

            // Determine start side randomly
            const startsLeft = Math.random() < 0.5;
            const startX = startsLeft ? -50 : window.innerWidth + 50;

            // Target the CENTER of the card
            const targetX = targetRect.left + targetRect.width / 2 - (flyingEmoji.offsetWidth / 2 || 16); // Adjust for emoji size approximation
            const targetY = targetRect.top + targetRect.height / 2 - (flyingEmoji.offsetHeight / 2 || 16);
            
            // Align Start Y with Target Y for simpler curve calculation relative to horizontal axis
            const startY = targetY; 

            // Calculate deltas relative to start
            const deltaX = targetX - startX;
            const deltaY = targetY - startY; // Will be 0

            // Calculate curve height (adjust multiplier for more/less arc)
            const curveHeight = Math.min(80, Math.abs(deltaX * 0.15)); 

            flyingEmoji.style.left = `${startX}px`;
            flyingEmoji.style.top = `${startY}px`; 
            flyingEmoji.style.opacity = '0'; 

            document.body.appendChild(flyingEmoji);

            // Keyframes with curve targeting the CENTER
            const flyAnimation = flyingEmoji.animate([
                // Start off-screen, small, semi-visible
                { transform: `translate(0, ${deltaY}) scale(0.6)`, opacity: 0.8, offset: 0 }, 
                 // Peak of the vertical arc
                { transform: `translate(${deltaX / 2}px, ${deltaY - curveHeight}px) scale(0.8)`, opacity: 1, offset: 0.4 },
                // Land near center, bounce up slightly
                { transform: `translate(${deltaX}px, ${deltaY - 15}px) scale(1.1)`, opacity: 1, offset: 0.8 }, 
                // Settle at center
                { transform: `translate(${deltaX}px, ${deltaY}) scale(1)`, opacity: 1, offset: 0.9 },
                // Fade out at center
                { transform: `translate(${deltaX}px, ${deltaY}) scale(0.9)`, opacity: 0, offset: 1 } 
              ], {
                duration: 1000, // Keep duration
                easing: 'ease-out',
                fill: 'forwards'
              });

            flyAnimation.onfinish = () => {
                 if (flyingEmoji.parentNode === document.body) {
                    document.body.removeChild(flyingEmoji);
                }
            };
        }

        // ***** NEW FUNCTION *****
        // Send animation event to Firebase
        function sendEmojiAnimationEvent(targetUserId, emojiChar) {
            if (!currentRoomId || !currentUserId) return; // <<< Also check currentUserId
            const animationsRef = ref(database, `rooms/${currentRoomId}/animations`);
            const newAnimationRef = push(animationsRef);

            const animationData = {
                targetUserId: targetUserId,
                emojiChar: emojiChar,
                senderUserId: currentUserId, // <<< ADDED: ID of the user sending the emoji
                timestamp: serverTimestamp()
            };
            // ... (rest of the function: set, then, catch) ...

             set(newAnimationRef, animationData)
                 .then(() => {
                     // Play locally immediately
                     const targetContainer = document.getElementById(`container-${targetUserId}`); 
                     console.log('[sendEmojiAnimationEvent] Found target for local play:', targetContainer); // <<< ADD LOG
                     if (targetContainer) {
                        triggerEmojiAnimation(targetContainer, emojiChar); 
                     } else {
                        console.warn("Target container not found for local animation", targetUserId);
                     }

                     // Schedule deletion
                     setTimeout(() => {
                         remove(newAnimationRef).catch(err => console.warn("Could not remove animation node:", err));
                     }, 3000);
                 })
                 .catch(error => {
                     console.error("Error sending animation event:", error);
                     showMessage("Fehler beim Senden der Animation.");
                 });
        }

        // --- Initialization ---

        // Initial setup: Read URL hash and show appropriate screen
        handleRouteChange();

        // Listen for hash changes (e.g., user navigating back/forward or link sharing)
        window.addEventListener('hashchange', handleRouteChange);

        // Add event listener for the copy link button
        // Ensure the button exists before adding listener (it's only in pokerRoomScreen)
        // We can add it here, or more safely, add it when pokerRoomScreen becomes visible.
        // Let's add it here and rely on the button element existing when needed.
        const copyBtn = document.getElementById('copyLinkButton');
         if (copyBtn) {
            copyBtn.addEventListener('click', handleCopyLink);
         } else {
            // If element not found immediately, try finding it after slight delay
            // (useful if script runs before full DOM parsing, though type="module" helps)
            setTimeout(() => {
                 const copyBtnDelayed = document.getElementById('copyLinkButton');
                 if(copyBtnDelayed) {
                     copyBtnDelayed.addEventListener('click', handleCopyLink);
                 }
            }, 0);
         }

        // <<< Added: Event listeners for Enter key in inputs >>>
        roomNameInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault(); // Prevent default form submission behavior
                createRoomButton.click(); // Trigger the button click
            }
        });

        displayNameInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                joinRoomButton.click();
            }
        });

        // <<< NEW: Event listener for return button on kicked screen >>>
        const returnToStartButton = document.getElementById('returnToStartButton');
        if (returnToStartButton) {
            returnToStartButton.addEventListener('click', () => {
                cleanupAndRedirect(); // Perform full cleanup and redirect
            });
        } else {
            // Optional: Handle if button not found immediately
            setTimeout(() => {
                 const returnBtnDelayed = document.getElementById('returnToStartButton');
                 if(returnBtnDelayed) {
                     returnBtnDelayed.addEventListener('click', cleanupAndRedirect);
                 }
            }, 0);
        }

        // <<< Global listener to hide panels on click outside >>>
        document.addEventListener('click', (event) => {
            // Check if the click target is outside any participant card group AND outside any panel wrapper
            if (!event.target.closest('.group') && !event.target.closest('.panels-wrapper')) {
                if (openPanelUserId) { // Only act if a panel was locked open

                     const openPanel = document.querySelector(`#participantsList .panels-wrapper[data-user-id="${openPanelUserId}"]`);
                     openPanel?.classList.remove('visible');
                    openPanelUserId = null; // Reset the lock state
                }
             }
             // Clicks inside a group or panel are ignored here
        });

            <div class="flex flex-col items-center w-full max-w-sm mx-auto">
                <input type="text" id="displayNameInput" placeholder="Dein Anzeigename" class="w-full px-4 py-2 border rounded-lg mb-3 focus:ring-green-500 focus:border-green-500">
                <button id="joinRoomButton" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg transition duration-150 ease-in-out">
                    Raum beitreten
                </button>
            </div>
        </div>

        <div id="pokerRoomScreen" class="hidden">
            <!-- New container for title and copy button -->
            <div class="relative flex justify-center items-center mb-4"> 
                <h1 class="text-center text-2xl font-bold text-gray-800">Planning Poker</h1>
                <!-- Moved Copy Link Button here -->
                 <button id="copyLinkButton" title="Einladungslink kopieren" class="hidden absolute right-0 p-2 text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-full transition duration-150 ease-in-out focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-indigo-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                    </svg>
                </button>
            </div>

            <!-- <<< NEW: Countdown Display Area >>> -->
            <div id="countdownDisplay" class="hidden text-center my-4">
                <span class="text-6xl font-bold text-blue-600"></span>
            </div>
            <!-- <<< END: Countdown Display Area >>> -->

            <div class="mb-6">
                <h2 class="text-lg font-semibold mb-3 text-gray-700">Teilnehmer:</h2>
                <div id="participantsList" class="flex flex-wrap gap-3 pb-2">
                    <div class="flex flex-col items-center p-2 rounded-lg shadow-sm bg-white min-w-[80px] animate-pulse-simple">
                         <div class="text-sm font-medium text-center mb-2 truncate bg-gray-200 h-4 w-12 rounded mx-auto"></div>
                         <div class="w-10 h-10 flex items-center justify-center rounded border bg-gray-200 border-gray-300"></div>
                     </div>
                     </div>
            </div>

             <div id="resultsSummary" class="hidden p-4 bg-blue-50 border border-blue-200 rounded-lg">
                 <h3 class="text-lg font-semibold mb-2 text-center">Durchschnitt</h3>
                </div>

             <!-- Moved Reveal Button here -->
            <div class="flex justify-center my-2">
                <button id="revealButton" class="min-w-[110px] bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-5 rounded-lg transition duration-150 ease-in-out disabled:opacity-50 disabled:cursor-not-allowed">
                    Aufdecken
                </button>
             </div>

            <div class="mb-6">
                <h2 class="text-lg font-semibold mb-3 text-gray-700">Deine Stimme:</h2>
                <div id="votingCards" class="flex flex-wrap justify-center gap-2">
                    <!-- Voting cards will be rendered here by JS -->
                    </div>
            </div>

            <!-- Container now only holds Reset button (conditionally visible) -->
            <div class="flex flex-col sm:flex-row justify-center gap-3 mt-6">
                <button id="resetButton" class="hidden bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-5 rounded-lg transition duration-150 ease-in-out disabled:opacity-50 disabled:cursor-not-allowed">
                    Zurücksetzen
                </button>
            </div>
        </div>

         <!-- Modified alert box for centering -->
         <div id="messageBox" class="hidden fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 p-4 border rounded-lg shadow-lg bg-white z-50 max-w-md w-11/12 md:w-auto">
            <div class="flex items-center">
                <span id="messageText" class="flex-grow mr-4"></span>
                <button id="closeMessageButton" class="font-bold text-xl">&times;</button>
            </div>
        </div>

        <!-- <<< NEW Kicked Out Screen >>> -->
        <div id="kickedOutScreen" class="hidden text-center">
            <h1 class="text-3xl font-bold mb-6 text-red-600">Du wurdest entfernt</h1>
            <p class="mb-4 text-gray-600">Du wurdest aus dem Raum entfernt.</p>
          
        </div>
        <!-- <<< END Kicked Out Screen >>> -->

    </div> </body>
